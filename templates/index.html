<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali Honorifics Translator</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8f9fa;
            --line: #dadce0;
            --text: #202124;
            --muted: #5f6368;
            --primary: #1a73e8;
            --primary-hover: #1765ca;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Noto Sans", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .page {
            max-width: 1280px;
            margin: 24px auto;
            padding: 0 12px;
        }

        .top-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 4px 14px;
            border-bottom: 1px solid var(--line);
            margin-bottom: 10px;
        }

        .brand {
            font-size: 20px;
            color: var(--primary);
            font-weight: 600;
        }

        .sub {
            font-size: 12px;
            color: var(--muted);
            text-align: right;
        }

        .status {
            display: none;
            font-size: 13px;
            margin-bottom: 10px;
            border-radius: 8px;
            padding: 10px 12px;
            border: 1px solid transparent;
        }

        .status.success {
            display: block;
            background: #e6f4ea;
            border-color: #b7dfbf;
            color: #137333;
        }

        .status.error {
            display: block;
            background: #fce8e6;
            border-color: #f2b8b5;
            color: #b3261e;
        }

        .status.loading {
            display: block;
            background: #e8f0fe;
            border-color: #c5d5fc;
            color: #174ea6;
        }

        .language-bar {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 12px 12px 0 0;
            background: #fff;
            overflow: hidden;
        }

        .lang-side {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            min-height: 62px;
        }

        .lang-side.right {
            justify-content: flex-start;
        }

        .chip {
            border: none;
            background: transparent;
            color: var(--muted);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 14px;
            cursor: default;
        }

        .chip.active {
            color: var(--primary);
            background: #e8f0fe;
            font-weight: 600;
        }

        .swap {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--muted);
            display: grid;
            place-items: center;
            font-size: 16px;
        }

        .panel-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border: 1px solid var(--line);
            border-top: none;
            border-radius: 0 0 12px 12px;
            overflow: hidden;
            min-height: 360px;
        }

        .panel {
            position: relative;
            border-right: 1px solid var(--line);
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .panel:last-child {
            border-right: none;
            background: var(--surface);
        }

        textarea {
            border: none;
            outline: none;
            resize: none;
            width: 100%;
            flex: 1;
            font-size: 26px;
            line-height: 1.35;
            background: transparent;
            color: var(--text);
            padding: 18px 18px 12px;
            font-family: inherit;
        }

        textarea::placeholder {
            color: #9aa0a6;
        }

        #outputText {
            color: #3c4043;
        }

        .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 14px;
            border-top: 1px solid rgba(218, 220, 224, 0.6);
            font-size: 12px;
            color: var(--muted);
        }

        .controls {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            padding: 9px 16px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            min-width: 120px;
        }

        .btn.primary:hover:not(:disabled) {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn:hover:not(:disabled) {
            background: #f1f3f4;
        }

        .btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(23, 78, 166, 0.2);
            border-top-color: #174ea6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 900px) {
            .panel-wrap {
                grid-template-columns: 1fr;
            }

            .panel {
                border-right: none;
                border-bottom: 1px solid var(--line);
                min-height: 220px;
            }

            .panel:last-child {
                border-bottom: none;
            }

            textarea {
                font-size: 20px;
            }

            .language-bar {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .swap {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-strip">
            <div class="brand">Honorific Aware Translator</div>
            <div class="sub">English to Nepali • Honorifics aware</div>
        </div>

        <div class="status" id="status"></div>

        <div class="language-bar">
            <div class="lang-side">
                <button class="chip">Source language</button>
                <button class="chip active">English</button>
            </div>
            <div class="swap" aria-hidden="true">⇄</div>
            <div class="lang-side right">
                <button class="chip active">Nepali</button>
            </div>
        </div>

        <div class="panel-wrap">
            <div class="panel">
                <textarea id="inputText" placeholder="Enter text"></textarea>
                <div class="meta">
                    <span>Press Ctrl+Enter to translate</span>
                    <span><span id="charCount">0</span></span>
                </div>
            </div>

            <div class="panel">
                <textarea id="outputText" disabled placeholder="Translation"></textarea>
                <div class="meta">
                    <span>Output</span>
                    <span id="outCount">0</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn primary" id="translateBtn">Translate</button>
            <button class="btn" id="copyBtn">Copy</button>
            <button class="btn" id="clearBtn">Clear</button>
        </div>
    </div>


    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const translateBtn = document.getElementById('translateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusDiv = document.getElementById('status');
        const charCount = document.getElementById('charCount');
        const outCount = document.getElementById('outCount');

        inputText.addEventListener('input', (e) => {
            charCount.textContent = e.target.value.length;
        });

        translateBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();

            if (!text) {
                showStatus('Please enter some text to translate', 'error');
                return;
            }

            translateBtn.disabled = true;
            showStatus('<span class="spinner"></span>Translating...', 'loading');
            outputText.value = '';
            outCount.textContent = '0';

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (data.success) {
                    outputText.value = data.translation;
                    outCount.textContent = data.translation.length;
                    showStatus('✅ Translation successful!', 'success');
                } else {
                    showStatus(`❌ ${data.error}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Network error. Please check your connection.', 'error');
            } finally {
                translateBtn.disabled = false;
            }
        });

        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            outputText.value = '';
            charCount.textContent = 0;
            outCount.textContent = 0;
            statusDiv.textContent = '';
            statusDiv.className = 'status';
            inputText.focus();
        });

        copyBtn.addEventListener('click', async () => {
            const text = outputText.value;

            if (!text) {
                showStatus('Nothing to copy', 'error');
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                showStatus('Copied to clipboard!', 'success');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (error) {
                console.error('Copy error:', error);
                showStatus('Failed to copy', 'error');
            }
        });

        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
            if (type !== 'loading') {
                setTimeout(() => {
                    statusDiv.textContent = '';
                    statusDiv.className = 'status';
                }, 3000);
            }
        }

        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                translateBtn.click();
            }
        });

        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (!data.model_loaded) {
                    showStatus('Model is loading or not available. Please train the model first.', 'error');
                    translateBtn.disabled = true;
                }
            } catch (error) {
                console.error('Health check error:', error);
            }
        });

        inputText.focus();
    </script>
</body>
</html>
