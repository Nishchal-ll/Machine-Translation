<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepali Honorifics Translator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            color: #202124;
        }

        /* Header */
        .header {
            background-color: white;
            border-bottom: 1px solid #dadce0;
            padding: 16px 0;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 24px;
            font-weight: 500;
            color: #1f2937;
        }

        .tagline {
            font-size: 13px;
            color: #5f6368;
        }

        /* Main Container */
        .main {
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .translator-container {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(60, 64, 67, 0.3), 0 1px 3px 1px rgba(60, 64, 67, 0.15);
            overflow: hidden;
        }

        .translator-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 400px;
        }

        .section {
            display: flex;
            flex-direction: column;
            border-right: 1px solid #dadce0;
            position: relative;
        }

        .section:last-child {
            border-right: none;
        }

        .section-header {
            padding: 12px 16px;
            border-bottom: 1px solid #dadce0;
            font-size: 13px;
            color: #5f6368;
            font-weight: 500;
        }

        .section-content {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        textarea {
            flex: 1;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            outline: none;
            background-color: white;
            color: #202124;
        }

        textarea::placeholder {
            color: #9aa0a6;
        }

        #outputText {
            background-color: #f8f9fa;
        }

        .char-count {
            font-size: 12px;
            color: #9aa0a6;
            padding: 8px 16px 12px 16px;
            text-align: right;
        }

        .button-group {
            display: flex;
            gap: 12px;
            padding: 16px;
            background-color: white;
            border-top: 1px solid #dadce0;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .translate-btn {
            background-color: #4285f4;
            color: white;
            min-width: 120px;
        }

        .translate-btn:hover:not(:disabled) {
            background-color: #357ae8;
            box-shadow: 0 2px 5px 0 rgba(66, 133, 244, 0.3);
        }

        .translate-btn:disabled {
            background-color: #dadce0;
            color: #9aa0a6;
            cursor: not-allowed;
        }

        .copy-btn {
            background-color: white;
            color: #4285f4;
            border: 1px solid #dadce0;
        }

        .copy-btn:hover:not(:disabled) {
            background-color: #f1f3f4;
            border-color: #dadce0;
        }

        .clear-btn {
            background-color: white;
            color: #202124;
            border: 1px solid #dadce0;
        }

        .clear-btn:hover {
            background-color: #f1f3f4;
            border-color: #dadce0;
        }

        button:disabled {
            opacity: 0.6;
        }

        .status {
            padding: 12px 16px;
            border-radius: 4px;
            text-align: center;
            font-size: 13px;
            display: none;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .status.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(12, 84, 96, 0.3);
            border-top-color: #0c5460;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .translator-content {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .section {
                border-right: none;
                border-bottom: 1px solid #dadce0;
                min-height: 250px;
            }

            .section:last-child {
                border-bottom: none;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .main {
                margin: 16px auto;
            }
        }

        @media (max-width: 600px) {
            textarea {
                font-size: 14px;
                min-height: 150px;
            }

            button {
                padding: 8px 16px;
                font-size: 13px;
            }

            .translator-content {
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <div>
                <div class="logo">Nepali Translator</div>
                <div class="tagline">English to Nepali with Honorifics</div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="status" id="status"></div>

        <div class="translator-container">
            <div class="translator-content">
                <!-- Input Section -->
                <div class="section">
                    <div class="section-header">English</div>
                    <div class="section-content">
                        <textarea id="inputText" placeholder="Enter text to translate..."></textarea>
                        <div class="char-count">
                            <span id="charCount">0</span>/500
                        </div>
                    </div>
                </div>

                <!-- Output Section -->
                <div class="section">
                    <div class="section-header">Nepali</div>
                    <div class="section-content">
                        <textarea id="outputText" disabled placeholder="Translation will appear here..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Button Group -->
            <div class="button-group">
                <button class="translate-btn" id="translateBtn">Translate</button>
                <button class="copy-btn" id="copyBtn">Copy</button>
                <button class="clear-btn" id="clearBtn">Clear</button>
            </div>
        </div>
    </div>


    <script>
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const translateBtn = document.getElementById('translateBtn');
        const clearBtn = document.getElementById('clearBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusDiv = document.getElementById('status');
        const charCount = document.getElementById('charCount');

        // Update character count
        inputText.addEventListener('input', (e) => {
            charCount.textContent = e.target.value.length;
            if (e.target.value.length > 500) {
                inputText.value = inputText.value.substring(0, 500);
                charCount.textContent = 500;
            }
        });

        // Translate function
        translateBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();

            if (!text) {
                showStatus('Please enter some text to translate', 'error');
                return;
            }

            translateBtn.disabled = true;
            showStatus('<span class="spinner"></span>Translating...', 'loading');
            outputText.value = '';

            try {
                const response = await fetch('/api/translate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                if (data.success) {
                    outputText.value = data.translation;
                    showStatus('✅ Translation successful!', 'success');
                } else {
                    showStatus(`❌ ${data.error}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('❌ Network error. Please check your connection.', 'error');
            } finally {
                translateBtn.disabled = false;
            }
        });

        // Clear function
        clearBtn.addEventListener('click', () => {
            inputText.value = '';
            outputText.value = '';
            charCount.textContent = 0;
            statusDiv.textContent = '';
            statusDiv.className = 'status';
            inputText.focus();
        });

        // Copy function
        copyBtn.addEventListener('click', async () => {
            const text = outputText.value;

            if (!text) {
                showStatus('Nothing to copy', 'error');
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                showStatus('Copied to clipboard!', 'success');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (error) {
                console.error('Copy error:', error);
                showStatus('Failed to copy', 'error');
            }
        });

        // Helper function to show status messages
        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
            if (type !== 'loading') {
                setTimeout(() => {
                    statusDiv.textContent = '';
                    statusDiv.className = 'status';
                }, 3000);
            }
        }

        // Allow Enter key for translation (Ctrl+Enter)
        inputText.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                translateBtn.click();
            }
        });

        // Check model status on load
        window.addEventListener('load', async () => {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                if (!data.model_loaded) {
                    showStatus('Model is loading or not available. Please train the model first.', 'error');
                    translateBtn.disabled = true;
                }
            } catch (error) {
                console.error('Health check error:', error);
            }
        });

        // Focus on input on load
        inputText.focus();
    </script>
</body>
</html>
